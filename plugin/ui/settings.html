<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>翻译 API 设置（智谱 GLM）</title>
  <link rel="stylesheet" href="common.css">
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>翻译 API 设置</h1>
      <p class="hint">默认使用智谱 GLM-4-Flash（免费）。支持中文、英文、印尼语互译：
        <b>源语种自动识别</b>，只需在下方选择要翻译成的目标语种。在
        <b>智谱开放平台 → 个人中心</b> 获取 API Key 填入即可。密钥由 Windows 当前用户加密保存，不写入工作簿。</p>

      <label for="apiKey">API Key</label>
      <input id="apiKey" type="password" autocomplete="new-password" placeholder="填写智谱 API Key">

      <label for="model">模型</label>
      <input id="model" autocomplete="off" placeholder="glm-4-flash">

      <label for="targetLang">目标语种（源语种自动识别）</label>
      <select id="targetLang">
        <option value="印尼语">印尼语</option>
        <option value="英语">英语</option>
        <option value="中文">中文</option>
      </select>

      <label for="baseUrl">接口地址（高级，换供应商时修改）</label>
      <input id="baseUrl" autocomplete="off" placeholder="https://open.bigmodel.cn/api/paas/v4/chat/completions">

      <label for="intervalMs">请求间隔（毫秒）</label>
      <input id="intervalMs" type="number" min="0" max="10000" step="100" value="300">

      <label><input id="replaceExistingBilingual" type="checkbox" style="width:auto"> 重新翻译并替换已有双语内容</label>
      <label><input id="createBackup" type="checkbox" style="width:auto"> 翻译前自动创建原文件备份</label>
      <div class="row">
        <button id="saveButton">保存并测试</button>
        <button id="closeButton" class="secondary">关闭</button>
      </div>
      <div id="status" class="status"></div>
    </div>
  </div>
  <script src="../js/util.js"></script>
  <script src="../js/api.js"></script>
  <script src="settings.js"></script>
</body>
</html>
